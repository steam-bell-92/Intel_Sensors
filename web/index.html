<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presence Detection App</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-topbar">
            <div class="brand">
                <span class="brand__dot" aria-hidden="true"></span>
                <h1>Presence Detection</h1>
            </div>
            <p class="app-topbar__meta">Active Model: <span id="active-model-label">Random Forest</span></p>
        </header>

        <main class="app-main">
            <section class="panel panel--form" aria-labelledby="detect-title">
                <div class="panel__head">
                    <h2 id="detect-title">Live Detection</h2>
                    <div class="control-row">
                        <label for="model-select">Model</label>
                        <select id="model-select" name="model">
                            <option value="rf" selected>Random Forest</option>
                            <option value="kmeans">K-Means</option>
                        </select>
                    </div>
                </div>

                <form id="prediction-form" class="predictor__form" autocomplete="off">
                    <div class="form-grid">
                        <div class="form-field">
                            <label for="temperature">Temperature (C)</label>
                            <input type="number" id="temperature" name="temperature" inputmode="decimal" step="0.1" min="-20" max="80" placeholder="18.5" required>
                        </div>
                        <div class="form-field">
                            <label for="humidity">Humidity (%)</label>
                            <input type="number" id="humidity" name="humidity" inputmode="decimal" step="0.1" min="0" max="100" placeholder="42" required>
                        </div>
                        <div class="form-field">
                            <label for="light">Light (Lux)</label>
                            <input type="number" id="light" name="light" inputmode="decimal" step="1" min="0" max="2000" placeholder="300" required>
                        </div>
                        <div class="form-field">
                            <label for="voltage">Voltage (V)</label>
                            <input type="number" id="voltage" name="voltage" inputmode="decimal" step="0.01" min="0" max="5" placeholder="2.75" required>
                        </div>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn">Run Detection</button>
                        <button type="reset" class="btn btn--ghost" id="reset-btn">Reset</button>
                    </div>
                </form>
            </section>

            <section class="panel panel--status" aria-label="Detection result">
                <div class="predictor__result" role="status" aria-live="polite">
                    <p class="predictor__headline">Awaiting sensor input.</p>
                    <p class="predictor__detail">Enter current readings and run detection.</p>
                    <p class="predictor__confidence"></p>
                </div>

                <div class="quick-values" aria-label="Quick test values">
                    <button class="quick-values__btn" data-temp="20.8" data-humidity="46" data-light="520" data-voltage="2.76">Likely Presence</button>
                    <button class="quick-values__btn" data-temp="16.3" data-humidity="31" data-light="90" data-voltage="2.71">Likely Empty</button>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>Dual-model detection mode enabled</p>
        </footer>
    </div>
    <script src="./script.js"></script>
</body>
</html>
